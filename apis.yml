aid: google-cloud-dataproc
name: Google Cloud Dataproc
description: >-
  Google Cloud Dataproc is a fully managed and highly scalable service for running Apache Spark, Apache Hadoop, Apache
  Flink, Presto, and other open-source data processing frameworks. It enables batch processing, querying, streaming, and
  machine learning use cases with cluster management that takes seconds instead of minutes, along with per-second
  billing and autoscaling capabilities.
