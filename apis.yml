apis:
  - name: Cloud Dataproc API
    description: >-
      The Cloud Dataproc API manages Hadoop-based clusters and jobs on Google Cloud. It provides programmatic access to
      create, configure, and delete clusters, submit and monitor Apache Spark, Hadoop, Hive, and Pig jobs, and manage
      workflow templates for orchestrating multi-step data processing pipelines. The API supports autoscaling policies,
      optional components, and integration with other Google Cloud services.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
